name: Generate SBOM

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: qte77/gha-sbom-action@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
